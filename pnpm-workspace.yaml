# Single-package "workspace" — see pos-api/pnpm-workspace.yaml for why
# `packages:` is here.
packages:
  - '.'

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - unrs-resolver
