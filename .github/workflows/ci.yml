name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # Pin to 11.4.x: pnpm 11.5+ requires Node >= 22.13 (uses node:sqlite),
        # but CI runs Node 20. Matches the lockfile's pnpm version.
        with: { version: 11.4.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm i18n:check
      - run: pnpm i18n:untranslated
      - run: npx tsc --noEmit
      - run: pnpm lint
      - run: pnpm build
